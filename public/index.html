<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>국내 상장사 재무분석 에이전트</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #080e08;
      --bg2: #0a140a;
      --bg3: #0f1a0f;
      --border: #2a3a2a;
      --border2: #3a5a3a;
      --green1: #8fb87a;
      --green2: #a8c89a;
      --green3: #5a8a5a;
      --green4: #4a6a4a;
      --green5: #3a5a3a;
      --text: #c8d8be;
      --text2: #b8ccb0;
      --text3: #8a9a82;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Malgun Gothic', 'Courier New', monospace;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 {
      font-size: 1.2rem;
      color: var(--green1);
      letter-spacing: 1px;
    }

    .btn-pdf {
      background: var(--green4);
      color: #fff;
      border: 1px solid var(--border2);
      padding: 8px 15px;
      cursor: pointer;
      font-weight: bold;
      border-radius: 4px;
      transition: background 0.2s;
    }

    .btn-pdf:hover {
      background: var(--green3);
    }

    #chatContainer {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .message {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 8px;
      line-height: 1.6;
      white-space: pre-wrap;
    }

    .message.user {
      background: var(--bg3);
      border: 1px solid var(--border);
      align-self: flex-end;
    }

    .message.assistant {
      background: var(--bg2);
      border: 1px solid var(--border2);
      align-self: flex-start;
      color: #fff;
    }

    /* PDF 출력용 스타일 커스텀 */
    .pdf-page {
      padding: 40px;
      color: #333 !important;
      background: #fff !important;
      font-family: 'Malgun Gothic', sans-serif;
    }

    #inputArea {
      background: var(--bg2);
      border-top: 1px solid var(--border);
      padding: 15px 20px;
      display: flex;
      gap: 10px;
    }

    #userInput {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 12px;
      border-radius: 4px;
      outline: none;
      font-size: 1rem;
    }

    #sendBtn {
      background: var(--green3);
      color: var(--bg);
      border: none;
      padding: 0 25px;
      font-weight: bold;
      cursor: pointer;
      border-radius: 4px;
    }

    #sendBtn:disabled {
      background: var(--border);
      cursor: not-allowed;
    }

    .loading-msg {
      color: var(--green1);
      font-style: italic;
      align-self: flex-start;
    }
  </style>
</head>
<body>

  <header>
    <h1>📈 국내 상장사 N개년 재무분석 에이전트</h1>
    <button class="btn-pdf" id="pdfBtn" onclick="downloadPDF()">📄 분석 결과 PDF 저장</button>
  </header>

  <div id="chatContainer">
    <div class="message assistant">안녕하세요! 분석하고자 하는 국내 상장사 이름과 분석 요청 사항(예: "삼성전자 3개년 안정성 비율 및 성장성 분석해줘")을 입력해 주세요. 실시간 정보를 탐색하여 보고서를 구성합니다.</div>
  </div>

  <div id="inputArea">
    <input type="text" id="userInput" placeholder="상장사 이름 및 재무분석 요건을 입력하세요..." onkeydown="if(event.key==='Enter') sendRequest()" />
    <button id="sendBtn" onclick="sendRequest()">분석 실행</button>
  </div>

  <script>
    const SYSTEM_PROMPT = `당신은 한국공인회계사(KICPA) 자격을 갖춘 정교한 재무분석 에이전트입니다.
반드시 제공된 googleSearch 툴을 활용하여 해당 기업의 최신 DART 공시, 요약재무제표, 재무비율(안정성, 수익성, 성장성, 활동성)을 수집하고 리포트를 작성하세요.
답변은 Markdown 형식을 사용하여 개조식으로 가독성 높게 작성해 주십시오.`;

    let history = [];
    let isLoading = false;

    async function sendRequest() {
      if (isLoading) return;
      const input = document.getElementById("userInput");
      const text = input.value.trim();
      if (!text) return;

      input.value = "";
      isLoading = true;
      document.getElementById("sendBtn").disabled = true;

      history.push({ role: "user", content: text });
      appendMessage("user", text);
      
      const loadingId = showLoading();

      try {
        const res = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            system: SYSTEM_PROMPT,
            messages: history,
          }),
        });

        const data = await res.json();
        if (data.error) throw new Error(data.error);

        const reply = (data.content || [])
          .filter(b => b.type === "text")
          .map(b => b.text)
          .join("\n");

        history.push({ role: "assistant", content: reply });
        removeLoading(loadingId);
        appendMessage("assistant", reply);
      } catch (err) {
        removeLoading(loadingId);
        appendMessage("assistant", `⚠️ 오류가 발생했습니다: ${err.message}`);
      } finally {
        isLoading = false;
        document.getElementById("sendBtn").disabled = false;
        input.focus();
      }
    }

    function appendMessage(role, text) {
      const container = document.getElementById("chatContainer");
      const div = document.createElement("div");
      div.className = `message ${role}`;
      div.innerText = text;
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
    }

    function showLoading() {
      const container = document.getElementById("chatContainer");
      const div = document.createElement("div");
      div.className = "loading-msg";
      div.id = "loading-" + Date.now();
      div.innerText = "🔍 실시간 DART 공시 및 재무 데이터를 검색 중입니다. 잠시만 기다려주세요...";
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
      return div.id;
    }

    function removeLoading(id) {
      const el = document.getElementById(id);
      if (el) el.remove();
    }

    // ⭐ 핵심: PDF 저장 기능 함수 구현
    function downloadPDF() {
      // 가장 마지막에 에이전트가 답변한 분석 리포트 내용 가져오기
      const assistants = document.querySelectorAll('.message.assistant');
      if (assistants.length <= 1) {
        alert("다운로드할 분석 결과가 없습니다. 먼저 기업 분석을 진행해 주세요.");
        return;
      }
      
      const lastReport = assistants[assistants.length - 1].innerText;

      // PDF 임시 인쇄용 깨끗한 컨테이너 만들기
      const element = document.createElement('div');
      element.className = 'pdf-page';
      element.innerHTML = `
        <h1 style="font-size: 20px; color: #111; border-bottom: 2px solid #333; padding-bottom: 10px; margin-bottom: 20px;">기업 재무분석 결과 보고서</h1>
        <div style="font-size: 12px; line-height: 1.8; white-space: pre-wrap; color: #333;">${lastReport}</div>
      `;

      // PDF 파일 저장 옵션 설정
      const opt = {
        margin:       15,
        filename:     '재무분석_보고서.pdf',
        image:        { type: 'jpeg', quality: 0.98 },
        html2canvas:  { scale: 2, useCORS: true },
        jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
      };

      // PDF 다운로드 실행
      html2pdf().set(opt).from(element).save();
    }
  </script>
</body>
</html>
