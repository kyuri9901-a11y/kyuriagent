<script>
// ── 시스템 프롬프트 ──
const SYSTEM_PROMPT = `# 국내 상장사 N개년 재무분석 에이전트 — 시스템 프롬프트 (범용)

## PART 0. 에이전트 동작 원칙 (신규 — 최우선)

1. 자율 진행 기본값: 아래 PART 6의 6단계를 순서대로 진행한다. 각 단계 산출물을 다음 단계 입력으로 쓴다. 사용자가 "계속" 신호를 줄 때까지 기다리지 말고, 한 턴 내에서 가능한 만큼 진행한 뒤 중간 결과를 보고한다.
2. 질문은 최소 1회, 최대 2회: 분석 대상 기업이 특정되지 않으면 기업명 확인. 분석 기간이 지정되지 않으면 직전 확정 3개 사업연도를 기본값으로 진행. 그 외 모호함은 기본값으로 가정하고 진행.
3. 중단 조건: 사업보고서를 못 찾거나 핵심 재무수치 중 2개 이상 결측 시에만 멈추고 확인.
4. 진행 중 보고: 데이터 수집 완료 시점과 정규화 완료 시점에 짧게 알리고 즉시 다음 단계로 진행. 승인을 구하지 않는다.

## PART 1. 페르소나

당신은 공인회계사(KICPA) 출신 재무자문 전문가다. Big4/중견 회계법인에서 외부감사·재무자문·기업가치평가·가업승계 자문을 다수 수행했다.
- 강점은 "숫자를 맞추는 것"이 아니라 "숫자 뒤의 구조와 흐름을 읽는 것".
- 이 보고서는 경영진/의사결정자 앞 보고다. 원하는 것은 "So what" + "Watch-list".
- 듣기 좋은 말을 하지 않는다. 실적이 좋아도 이면 리스크를 짚고, 나빠도 회복 신호나 구조적 개선 포인트를 정량으로 제시한다.
- 모든 주장은 공시 수치(Fact)와 분석가 해석(Interpretation)을 분리해 말한다. 추정은 추정이라 명시한다.
원칙: 과장 금지, 정규화(normalize) 우선, 업황·구조적 맥락 필수, 액션 시사점으로 마무리.

## PART 2. 미션 & 맥락

목적: 분석 대상 기업의 최근 N개 사업연도(기본 3개년) 재무 성과를 분석해 ① 현재 위치 ② 추세의 동인(driver) ③ 향후 점검 포인트를 파악하도록 한다.
핵심 질문 4개:
- 분석기간 동안 무슨 일이 일어났는가?
- 실적 변동의 진짜 동인은 무엇인가?
- 재무 체력은 안전한가?
- 다음 시점에 주시해야 할 신호 3가지는?

## PART 3. 데이터 소스 & 검증 원칙

자료 확보 우선순위: DART(dart.fss.or.kr) 공시 원문 → IR 자료 → 보도자료/증권사 리포트. 연도별로 분리해서 검색. 연결재무제표를 메인으로 하고 단위는 억원으로 통일.
정규화 필수: 일회성 항목(자산손상차손, 재고자산평가손실, 자산처분손익 등) 식별 후 조정 영업이익 별도 산출.
수치 무결성: 출처 불명확하거나 주석과 본문 충돌 시 "확인 필요"로 표기.
확실성 등급 표기: ①확정(공시 수치 기반) ②해석(분석가 판단) ③추정(가정 포함).

## PART 4. 분석 프레임워크 (5개 축)

축 1. 손익(Profitability): 매출액 N개년 추이·YoY·CAGR, 매출원가율·영업이익률·순이익률 추이, 동인 분해(물량×가격×믹스).
축 2. 재무상태(Financial Position): 자산 구성 변화, 운전자본 회전율, 부채비율·차입금 만기구조, 자기자본 변화.
축 3. 현금흐름(Cash Flow): 영업CF vs 투자CF, FCF(=영업CF-CapEx) 추이, 재무CF 패턴.
축 4. 핵심 비율(Ratios): 수익성(영업이익률·ROE·ROA), 안정성(부채비율·유동비율·이자보상배율), 활동성(회전율), 성장성. 각 비율에 해석 1줄 필수.
축 5. 정성 요인(Qualitative): 우발부채·소송·특수관계자 거래, 환율 민감도, 가동률.
산업 맥락 보강: 업황 국면 라벨링, 핵심 동인 1~2개 압축, 경쟁사 벤치마크(데이터 있을 때만).

## PART 6. 작업 워크플로우

1단계: DART 공시 기반 사업보고서/재무제표 원문 확보. 연도별로 분리 검색.
2단계: raw 수치 추출 → footing 검증 → 일회성 항목 식별 → 조정 영업이익 산출.
3단계: 비율 일괄 계산, 물량×가격×믹스 분해 시도.
4단계: 업황·산업 맥락 보강.
5단계: So-what / Watch-list 3가지 도출.
6단계: PART 8 포맷으로 출력.

## PART 8. 출력 포맷

[1] Executive Summary
[2] N개년 손익 분석 (동인 분해 포함)
[3] 재무상태 분석 (투자·운전자본·차입금)
[4] 현금흐름 분석 (영업CF·FCF)
[5] 핵심 비율 시계열 (수익성/안정성/활동성/성장성)
[6] 업황·산업 맥락 해석
[7] Watch-list & 액션 시사점
[부록] 정규화 내역 / 데이터 출처 / 가정

본문: 한국어, 개조식 + 핵심 표. 금액 억/조원. 비율 소수점 1자리. 모든 핵심 결론에 ①확정 ②해석 ③추정 등급 표기.

## PART 10. 금지 / 주의

- 일회성 항목 정규화 없이 "영업이익 급증/급감" 단정 금지
- 공시에 없는 수치 지어내기 금지 — 없으면 "확인 필요"
- 추정·전망을 확정 사실처럼 서술 금지
- 미래 주가·투자의견 제시 금지 (재무자문 목적, 투자권유 아님)
- 단계 건너뛰기 금지`;

// ── 상태 ──
let history = [];
let isLoading = false;

// ── 초기 메시지 ──
const INITIAL_MSG = `안녕하십니까. **국내 상장사 N개년 재무분석 에이전트**입니다.

저는 공인회계사(KICPA) 출신 재무자문 전문가 페르소나로, DART 공시 기반의 체계적인 재무분석을 수행합니다.

분석을 시작하려면 **기업명(또는 종목코드)** 을 알려주십시오.

예시:
- \`삼성전자\`
- \`005930 (삼성전자)\`
- \`삼성전자 5개년 분석 해줘\`

> 분석 기간을 별도로 지정하지 않으시면 **직전 확정 3개 사업연도**를 기본값으로 진행합니다.`;

// ── 마크다운 렌더러 ──
function renderMarkdown(text) {
  if (!text) return "";
  const lines = text.split("\n");
  const out = [];
  let i = 0, inTable = false, tableRows = [];

  function flushTable() {
    if (!tableRows.length) return;
    const header = tableRows[0];
    const body = tableRows.slice(2);
    const cols = r => r.split("|").filter((_, j, a) => j > 0 && j < a.length - 1);
    out.push(`<div class="tbl-wrap"><table>
      <thead><tr>${cols(header).map(c => `<th>${inlineMd(c.trim())}</th>`).join("")}</tr></thead>
      <tbody>${body.map(row => `<tr>${cols(row).map(c => `<td>${inlineMd(c.trim())}</td>`).join("")}</tr>`).join("")}</tbody>
    </table></div>`);
    tableRows = []; inTable = false;
  }

  while (i < lines.length) {
    const ln = lines[i];
    if (ln.trim().startsWith("|")) { inTable = true; tableRows.push(ln); i++; continue; }
    if (inTable) flushTable();

    if (!ln.trim()) { out.push(`<div class="spacer"></div>`); }
    else if (ln.startsWith("### ")) out.push(`<h3>${inlineMd(ln.slice(4))}</h3>`);
    else if (ln.startsWith("## ")) out.push(`<h2>${inlineMd(ln.slice(3))}</h2>`);
    else if (ln.startsWith("# ")) out.push(`<h1>${inlineMd(ln.slice(2))}</h1>`);
    else if (/^[-*_]{3,}$/.test(ln.trim())) out.push(`<hr>`);
    else if (ln.startsWith("```")) {
      let code = ""; i++;
      while (i < lines.length && !lines[i].startsWith("```")) { code += lines[i] + "\n"; i++; }
      out.push(`<pre><code>${esc(code)}</code></pre>`);
    }
    else if (ln.startsWith("> ")) out.push(`<blockquote>${inlineMd(ln.slice(2))}</blockquote>`);
    else if (/^[-*•] /.test(ln)) out.push(`<ul><li><span class="bullet">▸</span><span class="li-content">${inlineMd(ln.replace(/^[-*•] /,""))}</span></li></ul>`);
    else if (/^   [-*] /.test(ln) || /^\t[-*] /.test(ln)) out.push(`<ul><li style="margin-left:16px"><span class="bullet" style="color:#3a6a3a">·</span><span class="li-content" style="color:#b8ccb0">${inlineMd(ln.replace(/^[ \t]+[-*] /,""))}</span></li></ul>`);
    else if (/^\d+\. /.test(ln)) {
      const num = ln.match(/^(\d+)\./)[1];
      out.push(`<ul><li><span class="bullet" style="width:18px">${num}.</span><span class="li-content">${inlineMd(ln.replace(/^\d+\. /,""))}</span></li></ul>`);
    }
    else out.push(`<p>${inlineMd(ln)}</p>`);
    i++;
  }
  if (inTable) flushTable();
  return out.join("");
}

function esc(s) { return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function inlineMd(s) {
  return esc(s)
    .replace(/`([^`]+)`/g, `<code>$1</code>`)
    .replace(/\*\*([^*]+)\*\*/g, `<strong>$1</strong>`)
    .replace(/\*([^*]+)\*/g, `<em>$1</em>`)
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, `<a href="$2" target="_blank">$1</a>`);
}

// ── DOM 조작 ──
function appendMessage(role, content) {
  const area = document.getElementById("chatArea");

  if (role === "assistant") {
    const row = document.createElement("div");
    row.className = "msg-row";
    row.innerHTML = `
      <div class="avatar">AI</div>
      <div class="bubble-ai">
        <div class="bubble-label">◆ ANALYSIS OUTPUT — CONFIDENTIAL</div>
        <div class="md-content">${renderMarkdown(content)}</div>
      </div>`;
    area.appendChild(row);
  } else {
    const row = document.createElement("div");
    row.className = "msg-row user";
    row.innerHTML = `
      <div class="bubble-user">
        <span class="bubble-user-label">[USER]</span>${esc(content)}
      </div>
      <div class="avatar">USR</div>`;
    area.appendChild(row);
  }
  area.scrollTop = area.scrollHeight;
}

function showLoading() {
  const area = document.getElementById("chatArea");
  const el = document.createElement("div");
  el.id = "loadingRow";
  el.className = "msg-row";
  el.innerHTML = `
    <div class="avatar">AI</div>
    <div class="loading-box">
      <div class="loading-label">◆ PROCESSING — DART SEARCH IN PROGRESS</div>
      <div class="loading-bars">
        <div class="bars">
          <div class="bar"></div><div class="bar"></div>
          <div class="bar"></div><div class="bar"></div>
        </div>
        <span class="loading-text">DART 공시 검색 및 재무 데이터 수집 중...</span>
      </div>
    </div>`;
  area.appendChild(el);
  area.scrollTop = area.scrollHeight;
}

function hideLoading() {
  const el = document.getElementById("loadingRow");
  if (el) el.remove();
}

// ── API 호출 ──
async function sendMessage() {
  if (isLoading) return;
  const input = document.getElementById("userInput");
  const text = input.value.trim();
  if (!text) return;

  input.value = "";
  isLoading = true;
  document.getElementById("sendBtn").disabled = true;

  history.push({ role: "user", content: text });
  appendMessage("user", text);
  showLoading();

  try {
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 8000,
        system: SYSTEM_PROMPT,
        tools: [{ type: "web_search_20250305", name: "web_search" }],
        messages: history,
      }),
    });

    const data = await res.json();
    if (data.error) throw new Error(data.error);

    const reply = (data.content || [])
      .filter(b => b.type === "text")
      .map(b => b.text)
      .join("\n");

    history.push({ role: "assistant", content: reply });
    hideLoading();
    appendMessage("assistant", reply);
  } catch (err) {
    hideLoading();
    appendMessage("assistant", `⚠️ 오류가 발생했습니다: ${err.message}`);
  } finally {
    isLoading = false;
    document.getElementById("sendBtn").disabled = false;
    input.focus();
  }
}

function handleKey(e) {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function clearChat() {
  history = [];
  document.getElementById("chatArea").innerHTML = "";
  appendMessage("assistant", INITIAL_MSG);
}

// ── 초기화 ──
appendMessage("assistant", INITIAL_MSG);
</script>
