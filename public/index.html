<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>국내 상장사 재무분석 에이전트</title>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #080e08;
      --bg2: #0a140a;
      --bg3: #0f1a0f;
      --border: #2a3a2a;
      --border2: #3a5a3a;
      --green1: #8fb87a;
      --green2: #a8c89a;
      --green3: #5a8a5a;
      --green4: #4a6a4a;
      --green5: #3a5a3a;
      --text: #c8d8be;
      --text2: #b8ccb0;
      --text3: #8a9a82;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Courier New', 'Malgun Gothic', monospace;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── 헤더 ── */
    header {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .dots { display: flex; gap: 6px; }
    .dot { width: 12px; height: 12px; border-radius: 50%; }
    .dot1 { background: #3a5a3a; }
    .dot2 { background: #4a6a4a; }
    .dot3 { background: #5a8a5a; }
    .title { font-size: 13px; font-weight: bold; color: var(--green1); letter-spacing: 3px; text-transform: uppercase; }
    .subtitle { font-size: 11px; color: var(--green4); letter-spacing: 2px; margin-top: 2px; }
    
    .header-right { display: flex; align-items: center; gap: 10px; }
    .export-group { display: flex; gap: 6px; border-right: 1px solid var(--border); padding-right: 12px; }
    
    .btn-export {
      font-size: 11px; font-family: inherit; color: #fff;
      border: 1px solid var(--border2); background: #152515;
      padding: 6px 10px; cursor: pointer; transition: all .2s;
    }
    .btn-export:hover { background: var(--green3); color: var(--bg); border-color: var(--green2); }
    
    .btn-new {
      font-size: 11px; font-family: inherit; color: var(--green4);
      border: 1px solid var(--border); background: transparent;
      padding: 6px 12px; cursor: pointer; transition: all .2s;
    }
    .btn-new:hover { color: var(--green1); border-color: var(--green4); }

    /* ── 메인 ── */
    main {
      flex: 1;
      overflow-y: auto;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      max-width: 900px;
      width: 100%;
      margin: 0 auto;
    }
    main::-webkit-scrollbar { width: 6px; }
    main::-webkit-scrollbar-track { background: var(--bg); }
    main::-webkit-scrollbar-thumb { background: var(--border2); }

    .msg-row { display: flex; gap: 12px; }
    .msg-row.user { justify-content: flex-end; }
    .avatar {
      width: 32px; height: 32px; flex-shrink: 0;
      background: var(--bg2); border: 1px solid var(--border2);
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; color: var(--green3); font-weight: bold;
      margin-top: 4px;
    }
    .bubble-ai { background: var(--bg2); border: 1px solid var(--border); padding: 16px 20px; max-width: 820px; width: 100%; }
    .bubble-label { font-size: 10px; color: var(--green5); border-bottom: 1px solid #1a2a1a; padding-bottom: 8px; margin-bottom: 12px; }
    .bubble-user { background: #0f1f0f; border: 1px solid var(--border2); padding: 12px 16px; max-width: 560px; font-size: 13px; line-height: 1.6; color: #b8d8a8; white-space: pre-wrap; }

    /* ── 마크다운 스타일 ── */
    .md-content { font-size: 13px; line-height: 1.7; }
    .md-content h1 { font-size: 16px; font-weight: bold; color: #b8d8a8; margin: 20px 0 8px; border-bottom: 1px solid var(--border); padding-bottom: 4px; }
    .md-content h2 { font-size: 14px; font-weight: bold; color: var(--green2); margin: 16px 0 6px; border-bottom: 1px solid var(--border); padding-bottom: 4px; }
    .md-content h3 { font-size: 13px; font-weight: 600; color: var(--green1); margin: 12px 0 4px; }
    .md-content p { color: var(--text); margin: 4px 0; }
    .md-content strong { color: var(--green2); font-weight: 600; }
    .md-content pre { background: #0a140a; border: 1px solid var(--border); padding: 12px; margin: 8px 0; overflow-x: auto; }
    .md-content pre code { background: none; border: none; padding: 0; font-size: 12px; }
    .md-content blockquote { border-left: 2px solid var(--green4); padding-left: 12px; color: var(--text3); font-style: italic; margin: 8px 0; }
    .md-content hr { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
    .md-content ul { padding-left: 0; margin: 4px 0; list-style: none; }
    .md-content li { display: flex; gap: 8px; margin: 3px 0; }
    .md-content li .bullet { color: var(--green4); flex-shrink: 0; }
    
    .md-content .tbl-wrap { overflow-x: auto; margin: 12px 0; }
    .md-content table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .md-content th { background: #1a2a1a; color: var(--green1); padding: 7px 12px; text-align: left; border: 1px solid var(--border); font-weight: 600; }
    .md-content td { padding: 6px 12px; border: 1px solid var(--border); color: var(--text); }
    .md-content tr:nth-child(even) td { background: #0d170d; }
    .md-content .spacer { height: 10px; }

    /* ── 로딩 바 ── */
    .loading-box { background: var(--bg2); border: 1px solid var(--border); padding: 16px 20px; max-width: 820px; width: 100%; }
    .loading-label { font-size: 10px; color: var(--green5); border-bottom: 1px solid #1a2a1a; padding-bottom: 8px; margin-bottom: 12px; }
    .loading-bars { display: flex; align-items: center; gap: 12px; }
    .bars { display: flex; gap: 4px; }
    .bar { width: 5px; height: 18px; background: var(--green3); opacity: 0.3; animation: barPulse 1.2s ease-in-out infinite; }
    .bar:nth-child(2) { animation-delay: .15s; }
    .bar:nth-child(3) { animation-delay: .3s; }
    .bar:nth-child(4) { animation-delay: .45s; }
    @keyframes barPulse { 0%,100%{opacity:.2;transform:scaleY(.5)} 50%{opacity:1;transform:scaleY(1)} }
    .loading-text { font-size: 13px; color: var(--green4); }

    /* ── 푸터 ── */
    footer { border-top: 1px solid var(--border); background: var(--bg2); padding: 14px 16px; flex-shrink: 0; }
    .footer-inner { max-width: 900px; margin: 0 auto; }
    .input-wrap { display: flex; gap: 12px; align-items: flex-end; }
    .input-box { flex: 1; border: 1px solid var(--border2); background: var(--bg); transition: border-color .2s; }
    .input-box:focus-within { border-color: var(--green3); }
    .input-label { font-size: 10px; color: var(--green5); padding: 8px 12px 4px; }
    
    /* ⭐ 아래 placeholder 부분도 완전히 SK하이닉스로 교체했습니다! */
    textarea { width: 100%; background: transparent; color: var(--text); font-family: inherit; font-size: 13px; padding: 4px 12px 10px; border: none; outline: none; resize: none; }
    textarea::placeholder { color: #2a4a2a; }
    
    .btn-send { height: 80px; width: 72px; background: #1a3a1a; border: 1px solid var(--border2); color: var(--green1); font-family: inherit; font-size: 11px; font-weight: bold; cursor: pointer; transition: all .2s; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; }
    .btn-send:hover:not(:disabled) { background: #2a4a2a; border-color: var(--green3); }
    .btn-send:disabled { opacity: 0.3; cursor: not-allowed; }
    .footer-hints { display: flex; justify-content: space-between; margin-top: 8px; font-size: 10px; color: #2a4a2a; }

    .export-pdf-area { padding: 30px; color: #111 !important; background: #fff !important; }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="dots"><div class="dot dot1"></div><div class="dot dot2"></div><div class="dot dot3"></div></div>
    <div>
      <div class="title">Financial Analysis Agent</div>
      <div class="subtitle">국내 상장사 N개년 재무분석 · DART 공시 기반 · KICPA 페르소나</div>
    </div>
  </div>
  <div class="header-right">
    <div class="export-group">
      <button class="btn-export" onclick="exportPDF()">[PDF]</button>
      <button class="btn-export" onclick="exportWord()">[WORD]</button>
      <button class="btn-export" onclick="exportExcel()">[EXCEL]</button>
    </div>
    <button class="btn-new" onclick="clearChat()">[NEW SESSION]</button>
  </div>
</header>

<main id="chatArea"></main>

<footer>
  <div class="footer-inner">
    <div class="input-wrap">
      <div class="input-box">
        <div class="input-label">INPUT &gt;</div>
        <textarea id="userInput" rows="3" placeholder="기업명 또는 분석 요청을 입력하세요 (예: SK하이닉스 3개년 재무분석)" onkeydown="handleKey(event)"></textarea>
      </div>
      <button class="btn-send" id="sendBtn" onclick="sendMessage()">
        <span class="send-arrow">▶</span><span>SEND</span>
      </button>
    </div>
    <div class="footer-hints">
      <span>Enter로 전송 · Shift+Enter로 줄 바꿈 · 웹검색 활성화됨</span>
      <span>⚠ 본 분석은 재무자문 목적이며 투자권유가 아닙니다</span>
    </div>
  </div>
</footer>

<script>
const SYSTEM_PROMPT = `당신은 한국공인회계사(KICPA) 자격을 갖춘 정교한 재무분석 에이전트입니다.
반드시 제공된 googleSearch 툴을 활용하여 해당 기업의 최신 DART 공시, 요약재무제표, 재무비율(안정성, 수익성, 성장성, 활동성)을 수집하고 리포트를 작성하세요.
답변할 때 수치 데이터는 가급적 표(| 항목 | 연도 | 수치 |) 형태로 깔끔하게 작성해야 사용자가 엑셀 등으로 파싱하기 좋습니다.`;

let history = [];
let isLoading = false;

// ⭐ 첫 대화방 생성 시 기본 메시지 예시 고정
const INITIAL_MSG = `안녕하십니까. **국내 상장사 N개년 재무분석 에이전트**입니다.

분석을 시작하려면 **기업명(또는 종목코드)** 을 알려주십시오.

예시:
- \`SK하이닉스\`
- \`000660 (SK하이닉스)\`
- \`SK하이닉스 3개년 분석 해줘\`

> 분석 기간을 별도로 지정하지 않으시면 **직전 확정 3개 사업연도**를 기본값으로 진행합니다.`;

function renderMarkdown(text) {
  if (!text) return "";
  const lines = text.split("\n");
  const out = [];
  let i = 0, inTable = false, tableRows = [];

  function flushTable() {
    if (!tableRows.length) return;
    const header = tableRows[0];
    const body = tableRows.slice(2);
    const cols = r => r.split("|").filter((_, j, a) => j > 0 && j < a.length - 1);
    out.push(`<div class="tbl-wrap"><table class="data-table">
      <thead><tr>${cols(header).map(c => `<th>${inlineMd(c.trim())}</th>`).join("")}</tr></thead>
      <tbody>${body.map(row => `<tr>${cols(row).map(c => `<td>${inlineMd(c.trim())}</td>`).join("")}</tr>`).join("")}</tbody>
    </table></div>`);
    tableRows = []; inTable = false;
  }

  while (i < lines.length) {
    const ln = lines[i];
    if (ln.trim().startsWith("|")) { inTable = true; tableRows.push(ln); i++; continue; }
    if (inTable) flushTable();

    if (!ln.trim()) { out.push(`<div class="spacer"></div>`); }
    else if (ln.startsWith("### ")) out.push(`<h3>${inlineMd(ln.slice(4))}</h3>`);
    else if (ln.startsWith("## ")) out.push(`<h2>${inlineMd(ln.slice(3))}</h2>`);
    else if (ln.startsWith("# ")) out.push(`<h1>${inlineMd(ln.slice(2))}</h1>`);
    else if (ln.startsWith("> ")) out.push(`<blockquote>${inlineMd(ln.slice(2))}</blockquote>`);
    else if (/^[-*•] /.test(ln)) out.push(`<ul><li><span class="bullet">▸</span><span class="li-content">${inlineMd(ln.replace(/^[-*•] /,""))}</span></li></ul>`);
    else if (/^\d+\. /.test(ln)) {
      const num = ln.match(/^(\d+)\./)[1];
      out.push(`<ul><li><span class="bullet" style="width:18px">${num}.</span><span class="li-content">${inlineMd(ln.replace(/^\d+\. /,""))}</span></li></ul>`);
    }
    else out.push(`<p>${inlineMd(ln)}</p>`);
    i++;
  }
  if (inTable) flushTable();
  return out.join("");
}

function esc(s) { return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function inlineMd(s) {
  return esc(s)
    .replace(/`([^`]+)`/g, `<code>$1</code>`)
    .replace(/\*\*([^*]+)\*\*/g, `<strong>$1</strong>`);
}

function appendMessage(role, content) {
  const area = document.getElementById("chatArea");
  if (role === "assistant") {
    const row = document.createElement("div");
    row.className = "msg-row";
    row.innerHTML = `
      <div class="avatar">AI</div>
      <div class="bubble-ai">
        <div class="bubble-label">◆ ANALYSIS OUTPUT — CONFIDENTIAL</div>
        <div class="md-content">${renderMarkdown(content)}</div>
      </div>`;
    area.appendChild(row);
  } else {
    const row = document.createElement("div");
    row.className = "msg-row user";
    row.innerHTML = `
      <div class="bubble-user"><span class="bubble-user-label">[USER]</span>${esc(content)}</div>
      <div class="avatar">USR</div>`;
    area.appendChild(row);
  }
  area.scrollTop = area.scrollHeight;
}

function showLoading() {
  const area = document.getElementById("chatArea");
  const el = document.createElement("div");
  el.id = "loadingRow"; el.className = "msg-row";
  el.innerHTML = `
    <div class="avatar">AI</div>
    <div class="loading-box">
      <div class="loading-label">◆ PROCESSING — DART SEARCH IN PROGRESS</div>
      <div class="loading-bars">
        <div class="bars"><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div></div>
        <span class="loading-text">DART 공시 데이터 검색 및 금융 분석 서칭 중...</span>
      </div>
    </div>`;
  area.appendChild(el);
  area.scrollTop = area.scrollHeight;
}

function hideLoading() { const el = document.getElementById("loadingRow"); if (el) el.remove(); }

async function sendMessage() {
  if (isLoading) return;
  const input = document.getElementById("userInput");
  const text = input.value.trim();
  if (!text) return;

  input.value = ""; isLoading = true;
  document.getElementById("sendBtn").disabled = true;

  history.push({ role: "user", content: text });
  appendMessage("user", text);
  showLoading();

  try {
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ system: SYSTEM_PROMPT, messages: history }),
    });

    const data = await res.json();
    if (data.error) throw new Error(data.error);

    const reply = (data.content || []).filter(b => b.type === "text").map(b => b.text).join("\n");
    history.push({ role: "assistant", content: reply });
    hideLoading();
    appendMessage("assistant", reply);
  } catch (err) {
    hideLoading();
    appendMessage("assistant", `⚠️ 오류 발생: ${err.message}`);
  } finally {
    isLoading = false; document.getElementById("sendBtn").disabled = false; input.focus();
  }
}

function handleKey(e) { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); } }
function clearChat() { history = []; document.getElementById("chatArea").innerHTML = ""; appendMessage("assistant", INITIAL_MSG); }

function exportPDF() {
  const aiBubbles = document.querySelectorAll('.bubble-ai');
  if (!aiBubbles.length) return alert("저장할 리포트가 없습니다.");
  const htmlContent = aiBubbles[aiBubbles.length - 1].querySelector('.md-content').innerHTML;

  const element = document.createElement('div');
  element.className = 'export-pdf-area';
  element.innerHTML = `<h1 style="font-size:20px; border-bottom:2px solid #222; padding-bottom:8px; margin-bottom:20px;">재무분석 보고서</h1>${htmlContent}`;

  const opt = {
    margin: 15, filename: '재무분석_리포트.pdf', image: { type: 'jpeg', quality: 0.98 },
    html2canvas: { scale: 2, backgroundColor: '#ffffff' }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
  };
  html2pdf().set(opt).from(element).save();
}

function exportWord() {
  const aiBubbles = document.querySelectorAll('.bubble-ai');
  if (!aiBubbles.length) return alert("저장할 리포트가 없습니다.");
  const textContent = aiBubbles[aiBubbles.length - 1].querySelector('.md-content').innerText;

  const blob = new Blob([`\ufeff${textContent}`], { type: 'application/msword;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = '재무분석_리포트.doc';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}

function exportExcel() {
  const aiBubbles = document.querySelectorAll('.bubble-ai');
  if (!aiBubbles.length) return alert("저장할 리포트가 없습니다.");
  
  const lastBubble = aiBubbles[aiBubbles.length - 1];
  const tables = lastBubble.querySelectorAll('table');
  
  if (!tables.length) {
    return alert("리포트 내부에 엑셀로 변환할 표(Table) 데이터가 보이지 않습니다. 일반 텍스트 형태로 다운로드하려면 WORD를 활용해 주세요.");
  }

  const wb = XLSX.utils.book_new();
  tables.forEach((table, index) => {
    const ws = XLSX.utils.table_to_sheet(table);
    XLSX.utils.book_append_sheet(wb, ws, `재무데이터_표_${index + 1}`);
  });

  XLSX.writeFile(wb, '재무분석_데이터셋.xlsx');
}

appendMessage("assistant", INITIAL_MSG);
</script>
</body>
</html>
